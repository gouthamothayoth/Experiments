<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Newton's Gravity</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #ffffff;
      min-height: 100dvh;
      overflow: hidden;
      font-family: 'Courier Prime', 'Courier New', Courier, monospace;
      touch-action: none;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    /* ── Start screen ─────────────────────────────────────────────── */
    #start-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background: #ffffff;
      z-index: 200;
      padding: 40px;
    }

    #start-screen h1 {
      font-family: 'Courier Prime', 'Courier New', Courier, monospace;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.1em;
      color: #000;
      text-transform: uppercase;
      text-align: center;
    }

    #start-screen p {
      color: #999;
      font-family: 'Courier Prime', 'Courier New', Courier, monospace;
      font-size: 13px;
      text-align: center;
      max-width: 240px;
      line-height: 1.7;
    }

    #start-btn {
      padding: 14px 36px;
      font-size: 13px;
      font-family: 'Courier Prime', 'Courier New', Courier, monospace;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      -webkit-tap-highlight-color: transparent;
    }

    #start-btn:active { opacity: 0.7; }

    /* ── Hidden paragraph used only for measuring letter positions ── */
    #para-measure {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: calc(100% - 48px);
      max-width: 360px;
      font-family: 'Courier Prime', 'Courier New', Courier, monospace;
      font-size: 18px;
      font-weight: 400;
      line-height: 1.85;
      color: #000;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
      /* Invisible but still laid out so getBoundingClientRect works */
      visibility: hidden;
      pointer-events: none;
      z-index: 1;
    }

    /* ── Physics letters (fixed-positioned after measurement) ──────── */
    .letter {
      position: fixed;
      top: 0;
      left: 0;
      color: #000;
      font-family: 'Courier Prime', 'Courier New', Courier, monospace;
      font-size: 18px;
      font-weight: 400;
      line-height: 1;
      user-select: none;
      pointer-events: none;
      will-change: transform;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: geometricPrecision;
    }

  </style>
</head>
<body>

  <!-- Start screen -->
  <div id="start-screen">
    <h1>Newton's Law of<br>Universal Gravitation</h1>
    <p>Letters start in place.<br>Tilt your phone to feel gravity.</p>
    <button id="start-btn">Begin</button>
  </div>

  <!-- Invisible paragraph used to measure natural letter positions -->
  <div id="para-measure"></div>


  <script>
    const SENTENCE =
      "Newton\u2019s law of universal gravitation describes gravity as a force " +
      "where every particle attracts every other particle in the universe. " +
      "The attraction is proportional to the product of their masses and " +
      "inversely proportional to the square of the distance between their " +
      "centers of mass. It is a physical law derived from empirical observations " +
      "through inductive reasoning by Isaac Newton. The law was formulated in " +
      "Newton\u2019s work Philosophi\u00e6 Naturalis Principia Mathematica, " +
      "first published on July 5, 1687.";

    // ── Physics constants (gentle, slow movement) ────────────────────
    const GRAVITY_SCALE = 0.055;  // low — very gentle drift
    const FRICTION      = 0.994;  // high — slow, smooth deceleration
    const BOUNCE        = 0.40;   // soft bounce off walls

    let letters  = [];
    let gx = 0, gy = 0;
    let running  = false;
    let raf;

    // ── Step 1: build the invisible paragraph and measure positions ──
    function measureAndBuild() {
      const para = document.getElementById('para-measure');

      // Populate with one <span> per character
      [...SENTENCE].forEach(char => {
        const span = document.createElement('span');
        // Use a thin no-break space for actual spaces so they have width
        span.textContent = char === ' ' ? '\u202F\u202F' : char;
        span.style.whiteSpace = 'pre';
        para.appendChild(span);
      });

      // Wait two frames: one to lay out, one to be safe
      requestAnimationFrame(() => requestAnimationFrame(() => {
        const spans  = [...para.querySelectorAll('span')];
        const chars  = [...SENTENCE];

        chars.forEach((char, i) => {
          const r  = spans[i].getBoundingClientRect();

          // Create the physics span, anchored at top-left = 0,0
          const el = document.createElement('span');
          el.className  = 'letter';
          el.textContent = char === ' ' ? '\u00A0' : char;
          document.body.appendChild(el);

          letters.push({
            el,
            x:  r.left,          // start exactly where the paragraph placed it
            y:  r.top,
            vx: 0,               // at rest — no initial scatter
            vy: 0,
            w:  Math.max(r.width,  3),
            h:  Math.max(r.height, 3),
          });

          // Position immediately so there's no flash
          el.style.transform = `translate(${r.left.toFixed(2)}px,${r.top.toFixed(2)}px)`;
        });

        // Remove the measuring paragraph
        para.remove();

        // Short pause so user sees the readable text before gravity starts
        setTimeout(() => {
          running = true;
          tick();
        }, 600);
      }));
    }

    // ── Physics loop ─────────────────────────────────────────────────
    function tick() {
      if (!running) return;

      const W = window.innerWidth;
      const H = window.innerHeight;

      for (const l of letters) {
        l.vx += gx * GRAVITY_SCALE;
        l.vy += gy * GRAVITY_SCALE;

        l.vx *= FRICTION;
        l.vy *= FRICTION;

        l.x  += l.vx;
        l.y  += l.vy;

        // Bounce off screen edges
        if (l.x < 0)         { l.x = 0;         l.vx =  Math.abs(l.vx) * BOUNCE; }
        if (l.x > W - l.w)   { l.x = W - l.w;   l.vx = -Math.abs(l.vx) * BOUNCE; }
        if (l.y < 0)         { l.y = 0;          l.vy =  Math.abs(l.vy) * BOUNCE; }
        if (l.y > H - l.h)   { l.y = H - l.h;   l.vy = -Math.abs(l.vy) * BOUNCE; }

        l.el.style.transform = `translate(${l.x.toFixed(2)}px,${l.y.toFixed(2)}px)`;
      }

      raf = requestAnimationFrame(tick);
    }

    // ── Device orientation → gravity vector ──────────────────────────
    function onOrientation(e) {
      const gamma = e.gamma ?? 0;  // left/right tilt  (-90 → 90)
      const beta  = e.beta  ?? 0;  // fwd/back tilt    (-180 → 180)

      gx = Math.max(-45, Math.min(45, gamma)) / 45 * 9.8;
      gy = Math.max(-45, Math.min(45, beta))  / 45 * 9.8;
    }

    // ── Start button ─────────────────────────────────────────────────
    document.getElementById('start-btn').addEventListener('click', async () => {
      // iOS 13+ requires explicit permission for DeviceOrientationEvent
      if (
        typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function'
      ) {
        try {
          const perm = await DeviceOrientationEvent.requestPermission();
          if (perm !== 'granted') {
            alert('Motion permission is required to feel gravity.');
            return;
          }
        } catch (err) {
          console.warn('Permission error:', err);
        }
      }

      document.getElementById('start-screen').style.display = 'none';
      window.addEventListener('deviceorientation', onOrientation, true);

      // Wait a frame so the start screen is truly gone before measuring
      requestAnimationFrame(measureAndBuild);
    });

    // ── Pause when tab is hidden ──────────────────────────────────────
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        running = false;
        cancelAnimationFrame(raf);
      } else if (letters.length > 0) {
        running = true;
        tick();
      }
    });
  </script>
</body>
</html>
