<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Newton's Gravity</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #ffffff;
      min-height: 100dvh;
      overflow: hidden;
      font-family: 'Courier Prime', 'Courier New', Courier, monospace;
      touch-action: none;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    #start-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background: #ffffff;
      z-index: 100;
      padding: 40px;
    }

    #start-screen h1 {
      font-family: 'Courier Prime', 'Courier New', Courier, monospace;
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: #000;
      text-transform: uppercase;
    }

    #start-screen p {
      color: #888;
      font-family: 'Courier Prime', 'Courier New', Courier, monospace;
      font-size: 13px;
      text-align: center;
      max-width: 240px;
      line-height: 1.7;
    }

    #start-btn {
      padding: 14px 36px;
      font-size: 14px;
      font-family: 'Courier Prime', 'Courier New', Courier, monospace;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      -webkit-tap-highlight-color: transparent;
    }

    #start-btn:active {
      opacity: 0.75;
    }

    .letter {
      position: fixed;
      top: 0;
      left: 0;
      color: #000000;
      font-family: 'Courier Prime', 'Courier New', Courier, monospace;
      font-size: 22px;
      font-weight: 400;
      line-height: 1;
      user-select: none;
      pointer-events: none;
      will-change: transform;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: geometricPrecision;
    }

    #hint {
      position: fixed;
      bottom: 28px;
      left: 0;
      right: 0;
      text-align: center;
      color: #ccc;
      font-family: 'Courier Prime', 'Courier New', Courier, monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="start-screen">
    <h1>Newton's Law of Universal Gravitation</h1>
    <p>Tilt your phone to move the letters with gravity.</p>
    <button id="start-btn">Begin</button>
  </div>

  <div id="hint">tilt to feel gravity</div>

  <script>
    const SENTENCE =
      "Newton\u2019s law of universal gravitation describes gravity as a force " +
      "where every particle attracts every other particle in the universe. " +
      "The attraction is proportional to the product of their masses and " +
      "inversely proportional to the square of the distance between their " +
      "centers of mass. It is a physical law derived from empirical observations " +
      "through inductive reasoning by Isaac Newton. The law was formulated in " +
      "Newton\u2019s work Philosophi\u00e6 Naturalis Principia Mathematica, " +
      "first published on July 5, 1687.";

    const GRAVITY_SCALE = 0.20;
    const FRICTION      = 0.984;
    const BOUNCE        = 0.52;

    let letters = [];
    let gx = 0, gy = 0;
    let running = false;
    let raf;

    function makeLetter(char) {
      const el = document.createElement('span');
      el.className = 'letter';
      el.textContent = char === ' ' ? '\u00A0' : char;
      document.body.appendChild(el);

      return {
        el,
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        vx: (Math.random() - 0.5) * 5,
        vy: (Math.random() - 0.5) * 5,
        w: 13,
        h: 26,
      };
    }

    function scatter() {
      [...SENTENCE].forEach(char => {
        letters.push(makeLetter(char));
      });

      // Measure real glyph sizes after first paint
      requestAnimationFrame(() => {
        letters.forEach(l => {
          const r = l.el.getBoundingClientRect();
          l.w = Math.max(r.width,  4);
          l.h = Math.max(r.height, 4);
        });
      });
    }

    function tick() {
      if (!running) return;

      const W = window.innerWidth;
      const H = window.innerHeight;

      for (const l of letters) {
        l.vx += gx * GRAVITY_SCALE;
        l.vy += gy * GRAVITY_SCALE;

        l.vx *= FRICTION;
        l.vy *= FRICTION;

        l.x += l.vx;
        l.y += l.vy;

        if (l.x < 0)          { l.x = 0;          l.vx =  Math.abs(l.vx) * BOUNCE; }
        if (l.x > W - l.w)    { l.x = W - l.w;    l.vx = -Math.abs(l.vx) * BOUNCE; }
        if (l.y < 0)          { l.y = 0;           l.vy =  Math.abs(l.vy) * BOUNCE; }
        if (l.y > H - l.h)    { l.y = H - l.h;    l.vy = -Math.abs(l.vy) * BOUNCE; }

        l.el.style.transform = `translate(${l.x.toFixed(2)}px,${l.y.toFixed(2)}px)`;
      }

      raf = requestAnimationFrame(tick);
    }

    function onOrientation(e) {
      const gamma = e.gamma ?? 0;   // left/right  -90…90
      const beta  = e.beta  ?? 0;   // front/back  -180…180

      gx = Math.max(-45, Math.min(45, gamma)) / 45 * 9.8;
      gy = Math.max(-45, Math.min(45, beta))  / 45 * 9.8;
    }

    document.getElementById('start-btn').addEventListener('click', async () => {
      if (
        typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function'
      ) {
        try {
          const perm = await DeviceOrientationEvent.requestPermission();
          if (perm !== 'granted') {
            alert('Motion permission is required.');
            return;
          }
        } catch (err) {
          console.warn('Permission error:', err);
        }
      }

      document.getElementById('start-screen').style.display = 'none';
      window.addEventListener('deviceorientation', onOrientation, true);
      scatter();
      running = true;
      tick();
    });

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        running = false;
        cancelAnimationFrame(raf);
      } else if (letters.length > 0) {
        running = true;
        tick();
      }
    });
  </script>
</body>
</html>
