<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Newton's Gravity</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #ffffff;
      min-height: 100dvh;
      overflow: hidden;
      font-family: 'Courier Prime', 'Courier New', Courier, monospace;
      touch-action: none;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    /* ── Start screen ──────────────────────────────────────────── */
    #start-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background: #ffffff;
      z-index: 200;
      padding: 40px;
    }

    #start-screen h1 {
      font-family: 'Courier Prime', 'Courier New', Courier, monospace;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.1em;
      color: #000;
      text-transform: uppercase;
      text-align: center;
    }

    #start-screen p {
      color: #999;
      font-family: 'Courier Prime', 'Courier New', Courier, monospace;
      font-size: 13px;
      text-align: center;
      max-width: 240px;
      line-height: 1.7;
    }

    #start-btn {
      padding: 14px 36px;
      font-size: 13px;
      font-family: 'Courier Prime', 'Courier New', Courier, monospace;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      -webkit-tap-highlight-color: transparent;
    }

    #start-btn:active { opacity: 0.7; }

    /*
     * ── Measuring paragraph ─────────────────────────────────────
     * Spans the full viewport with safe-area padding so every line
     * wraps naturally — exactly as it will appear as physics letters.
     * visibility:hidden keeps it off-screen visually but still laid out.
     */
    #para-measure {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      /* env() gives iPhone notch / home-bar clearance */
      padding-top:    max(48px, env(safe-area-inset-top,    48px));
      padding-bottom: max(32px, env(safe-area-inset-bottom, 32px));
      padding-left:   max(24px, env(safe-area-inset-left,   24px));
      padding-right:  max(24px, env(safe-area-inset-right,  24px));
      font-family: 'Courier Prime', 'Courier New', Courier, monospace;
      font-weight: 400;
      line-height: 1.8;
      color: #000;
      white-space: normal;
      word-break: normal;
      overflow-wrap: break-word;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
      visibility: hidden;
      pointer-events: none;
      z-index: 1;
    }

    /* ── Physics letters ───────────────────────────────────────── */
    .letter {
      position: fixed;
      top: 0;
      left: 0;
      color: #000;
      font-family: 'Courier Prime', 'Courier New', Courier, monospace;
      font-weight: 400;
      line-height: 1;
      user-select: none;
      pointer-events: none;
      will-change: transform;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: geometricPrecision;
    }
  </style>
</head>
<body>

  <div id="start-screen">
    <h1>Newton's Law of<br>Universal Gravitation</h1>
    <p>Letters start in place.<br>Tilt your phone to feel gravity.</p>
    <button id="start-btn">Begin</button>
  </div>

  <div id="para-measure"></div>

  <script>
    const SENTENCE =
      "Newton\u2019s law of universal gravitation describes gravity as a force " +
      "where every particle attracts every other particle in the universe. " +
      "The attraction is proportional to the product of their masses and " +
      "inversely proportional to the square of the distance between their " +
      "centers of mass. It is a physical law derived from empirical observations " +
      "through inductive reasoning by Isaac Newton. The law was formulated in " +
      "Newton\u2019s work Philosophi\u00e6 Naturalis Principia Mathematica, " +
      "first published on July 5, 1687.";

    const GRAVITY_SCALE = 0.055;
    const FRICTION      = 0.994;
    const BOUNCE        = 0.40;

    let letters = [];
    let gx = 0, gy = 0;
    let running = false;
    let raf;

    // ── Fit font size so the paragraph doesn't overflow the viewport ──
    function fitFontSize(para) {
      // Start at a comfortable size and shrink until the content fits
      let size = 17;
      para.style.fontSize = size + 'px';
      while (size > 9 && para.scrollHeight > window.innerHeight) {
        size -= 0.5;
        para.style.fontSize = size + 'px';
      }
      return size;
    }

    // ── Build invisible paragraph, measure every letter's position ────
    function measureAndBuild() {
      const para = document.getElementById('para-measure');

      // One inline <span> per character — no white-space:pre so the
      // paragraph wraps naturally at word boundaries
      [...SENTENCE].forEach(char => {
        const span = document.createElement('span');
        span.textContent = char;
        para.appendChild(span);
      });

      // Fit the font size to the screen before measuring
      const fontSize = fitFontSize(para);

      // Two rAFs: first forces layout, second confirms stable geometry
      requestAnimationFrame(() => requestAnimationFrame(() => {
        const spans = [...para.querySelectorAll('span')];

        spans.forEach((span, i) => {
          const char = SENTENCE[i];
          const r    = span.getBoundingClientRect();

          const el = document.createElement('span');
          el.className   = 'letter';
          el.textContent = char === ' ' ? '\u00A0' : char;
          el.style.fontSize = fontSize + 'px';
          document.body.appendChild(el);

          const obj = {
            el,
            x:  r.left,
            y:  r.top,
            vx: 0,
            vy: 0,
            w:  Math.max(r.width,  2),
            h:  Math.max(r.height, 2),
          };

          letters.push(obj);
          el.style.transform = `translate(${r.left.toFixed(2)}px,${r.top.toFixed(2)}px)`;
        });

        para.remove();

        // Brief pause so reader can see the full paragraph before tilt begins
        setTimeout(() => { running = true; tick(); }, 800);
      }));
    }

    // ── Physics loop ──────────────────────────────────────────────────
    function tick() {
      if (!running) return;

      const W = window.innerWidth;
      const H = window.innerHeight;

      for (const l of letters) {
        l.vx += gx * GRAVITY_SCALE;
        l.vy += gy * GRAVITY_SCALE;

        l.vx *= FRICTION;
        l.vy *= FRICTION;

        l.x += l.vx;
        l.y += l.vy;

        if (l.x < 0)       { l.x = 0;       l.vx =  Math.abs(l.vx) * BOUNCE; }
        if (l.x > W - l.w) { l.x = W - l.w; l.vx = -Math.abs(l.vx) * BOUNCE; }
        if (l.y < 0)       { l.y = 0;        l.vy =  Math.abs(l.vy) * BOUNCE; }
        if (l.y > H - l.h) { l.y = H - l.h; l.vy = -Math.abs(l.vy) * BOUNCE; }

        l.el.style.transform = `translate(${l.x.toFixed(2)}px,${l.y.toFixed(2)}px)`;
      }

      raf = requestAnimationFrame(tick);
    }

    // ── Device orientation → gravity vector ───────────────────────────
    function onOrientation(e) {
      const gamma = e.gamma ?? 0;
      const beta  = e.beta  ?? 0;
      gx = Math.max(-45, Math.min(45, gamma)) / 45 * 9.8;
      gy = Math.max(-45, Math.min(45, beta))  / 45 * 9.8;
    }

    // ── Start button ──────────────────────────────────────────────────
    document.getElementById('start-btn').addEventListener('click', async () => {
      if (
        typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function'
      ) {
        try {
          const perm = await DeviceOrientationEvent.requestPermission();
          if (perm !== 'granted') {
            alert('Motion permission is required to feel gravity.');
            return;
          }
        } catch (err) {
          console.warn('Permission error:', err);
        }
      }

      document.getElementById('start-screen').style.display = 'none';
      window.addEventListener('deviceorientation', onOrientation, true);
      requestAnimationFrame(measureAndBuild);
    });

    // ── Pause / resume on tab visibility ──────────────────────────────
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        running = false;
        cancelAnimationFrame(raf);
      } else if (letters.length > 0) {
        running = true;
        tick();
      }
    });
  </script>
</body>
</html>
