<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Snow Globe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      touch-action: none;
      background: #ffffff;
    }

    canvas { position: fixed; inset: 0; display: block; }

    #para {
      position: fixed;
      top: 0;
      visibility: hidden;
      pointer-events: none;
      text-align: center;
      font-family: 'Courier Prime', 'Courier New', Courier, monospace;
      font-weight: 400;
      white-space: normal;
      word-break: normal;
      overflow-wrap: break-word;
      line-height: 1.78;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: geometricPrecision;
      z-index: -1;
    }
  </style>
</head>
<body>

<canvas id="c"></canvas>
<div id="para"></div>

<script>
  /* ─── Text ──────────────────────────────────────────────────────── */
  const SENTENCE =
    "The cities swept about me like dead leaves, leaves that were " +
    "brightly colored but torn away from the branches. I would have " +
    "stopped, but I was pursued by something. It always came upon me " +
    "unawares, taking me altogether by surprise. Perhaps it was a " +
    "familiar bit of music. Perhaps it was only a piece of transparent glass.";

  /* ─── Canvas + DPR ─────────────────────────────────────────────── */
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  const dpr    = Math.min(window.devicePixelRatio || 1, 3);

  let W, H, CX, CY;

  function setupCanvas() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width        = W * dpr;
    canvas.height       = H * dpr;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    CX = W / 2;
    CY = H / 2;
  }

  /* ─── Physics constants ─────────────────────────────────────────── */
  const GRAVITY     = 0.018;
  const DAMPING     = 0.994;
  const BOUNCE_LOSS = 0.15;
  const FOCAL       = 380;
  const Z_MAX       = 260;
  const EDGE_PAD    = 12;

  /* ─── State ─────────────────────────────────────────────────────── */
  let particles = [];
  let fontSize  = 15;
  let state     = 'loading';
  let raf;

  /* ─── DOM measurement ───────────────────────────────────────────── */
  function fitFontSize(para, maxH) {
    let size = 18;
    para.style.fontSize = size + 'px';
    while (size > 9 && para.scrollHeight > maxH) {
      size -= 0.5;
      para.style.fontSize = size + 'px';
    }
    return size;
  }

  function measureParticles() {
    const para    = document.getElementById('para');
    const padX    = Math.max(24, W * 0.07);
    const padY    = Math.max(60, H * 0.10);
    const usableW = W - padX * 2;
    const usableH = H - padY * 2;

    para.style.width = usableW + 'px';
    para.style.left  = padX + 'px';

    [...SENTENCE].forEach(char => {
      const s = document.createElement('span');
      s.textContent = char;
      para.appendChild(s);
    });

    fontSize = fitFontSize(para, usableH);

    requestAnimationFrame(() => requestAnimationFrame(() => {
      const paraH = para.getBoundingClientRect().height;
      const spans = [...para.querySelectorAll('span')];

      [...SENTENCE].forEach((char, i) => {
        const r = spans[i].getBoundingClientRect();
        // Store position relative to screen centre
        particles.push({
          char,
          fs:  fontSize,
          x:   r.left + r.width  / 2 - CX,
          y:   r.top  + r.height / 2 - paraH / 2,
          z:   0,
          vx:  0, vy: 0, vz: 0,
          w:   Math.max(r.width,  2),
          h:   Math.max(r.height, 2),
        });
      });

      para.remove();
      state = 'initial';
      drawFrame();
    }));
  }

  /* ─── Physics update ────────────────────────────────────────────── */
  function update() {
    const halfW = CX - EDGE_PAD;
    const halfH = CY - EDGE_PAD;

    for (const p of particles) {
      p.vy += GRAVITY;
      p.vx *= DAMPING;
      p.vy *= DAMPING;
      p.vz *= DAMPING;
      p.x  += p.vx;
      p.y  += p.vy;
      p.z  += p.vz;

      // Screen-edge bounce (x, y)
      if (p.x < -halfW) { p.x = -halfW; p.vx =  Math.abs(p.vx) * BOUNCE_LOSS; }
      if (p.x >  halfW) { p.x =  halfW; p.vx = -Math.abs(p.vx) * BOUNCE_LOSS; }
      if (p.y < -halfH) { p.y = -halfH; p.vy =  Math.abs(p.vy) * BOUNCE_LOSS; }
      if (p.y >  halfH) { p.y =  halfH; p.vy = -Math.abs(p.vy) * BOUNCE_LOSS; }

      // Z clamp
      if (p.z < -Z_MAX) { p.z = -Z_MAX; p.vz =  Math.abs(p.vz) * BOUNCE_LOSS; }
      if (p.z >  Z_MAX) { p.z =  Z_MAX; p.vz = -Math.abs(p.vz) * BOUNCE_LOSS; }
    }
  }

  /* ─── Render ────────────────────────────────────────────────────── */
  function drawFrame() {
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, W, H);

    if (state === 'initial') {
      // Flat, readable paragraph
      ctx.textBaseline = 'middle';
      ctx.textAlign    = 'center';

      for (const p of particles) {
        if (!p.char.trim()) continue;
        ctx.fillStyle = '#111111';
        ctx.font      = `${p.fs}px 'Courier Prime','Courier New',Courier,monospace`;
        ctx.fillText(p.char, CX + p.x, CY + p.y);
      }

    } else {
      // 3-D physics particles
      const pMax = FOCAL / (FOCAL - Z_MAX);
      const pMin = FOCAL / (FOCAL + Z_MAX);

      const sorted = [...particles].sort((a, b) => b.z - a.z);

      ctx.textBaseline = 'middle';
      ctx.textAlign    = 'center';

      for (const p of sorted) {
        if (!p.char.trim()) continue;

        const persp = FOCAL / (FOCAL + p.z);
        const sx    = CX + p.x * persp;
        const sy    = CY + p.y * persp;
        const fs    = Math.max(6, p.fs * persp);
        const alpha = 0.10 + 0.90 * Math.max(0, (persp - pMin) / (pMax - pMin));

        ctx.globalAlpha = Math.min(1, alpha);
        ctx.fillStyle   = '#111111';
        ctx.font        = `${fs.toFixed(2)}px 'Courier Prime','Courier New',Courier,monospace`;
        ctx.fillText(p.char, sx, sy);
      }
      ctx.globalAlpha = 1;
    }

    // Quiet "tap" hint — only before physics start
    if (state === 'initial') {
      ctx.fillStyle    = 'rgba(0,0,0,0.18)';
      ctx.font         = `11px 'Courier Prime','Courier New',Courier,monospace`;
      ctx.textBaseline = 'bottom';
      ctx.textAlign    = 'center';
      ctx.fillText('tap', CX, H - 24);
    }

    drawGlassEdges();
  }

  /* ─── Glass edge refraction overlay ────────────────────────────── */
  function drawGlassEdges() {
    const T = Math.min(W, H) * 0.13; // refraction band thickness
    let g;

    // ── Frosted white haze on all four edges ──
    // Simulates how a curved glass lens scatters and brightens at the rim

    g = ctx.createLinearGradient(0, 0, T, 0);          // left
    g.addColorStop(0,    'rgba(255,255,255,0.82)');
    g.addColorStop(0.45, 'rgba(255,255,255,0.18)');
    g.addColorStop(1,    'rgba(255,255,255,0)');
    ctx.fillStyle = g; ctx.fillRect(0, 0, T, H);

    g = ctx.createLinearGradient(W, 0, W - T, 0);      // right
    g.addColorStop(0,    'rgba(255,255,255,0.82)');
    g.addColorStop(0.45, 'rgba(255,255,255,0.18)');
    g.addColorStop(1,    'rgba(255,255,255,0)');
    ctx.fillStyle = g; ctx.fillRect(W - T, 0, T, H);

    g = ctx.createLinearGradient(0, 0, 0, T);           // top
    g.addColorStop(0,    'rgba(255,255,255,0.82)');
    g.addColorStop(0.45, 'rgba(255,255,255,0.18)');
    g.addColorStop(1,    'rgba(255,255,255,0)');
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, T);

    g = ctx.createLinearGradient(0, H, 0, H - T);      // bottom
    g.addColorStop(0,    'rgba(255,255,255,0.82)');
    g.addColorStop(0.45, 'rgba(255,255,255,0.18)');
    g.addColorStop(1,    'rgba(255,255,255,0)');
    ctx.fillStyle = g; ctx.fillRect(0, H - T, W, T);

    // ── Chromatic dispersion fringe ──
    // Glass splits white light — cool blue shifts to the left,
    // warm amber to the right, like looking through a prism edge.

    g = ctx.createLinearGradient(0, 0, T * 0.55, 0);
    g.addColorStop(0, 'rgba(170,205,255,0.30)');
    g.addColorStop(1, 'rgba(170,205,255,0)');
    ctx.fillStyle = g; ctx.fillRect(0, 0, T * 0.55, H);

    g = ctx.createLinearGradient(W, 0, W - T * 0.55, 0);
    g.addColorStop(0, 'rgba(255,215,140,0.28)');
    g.addColorStop(1, 'rgba(255,215,140,0)');
    ctx.fillStyle = g; ctx.fillRect(W - T * 0.55, 0, T * 0.55, H);

    g = ctx.createLinearGradient(0, 0, 0, T * 0.55);
    g.addColorStop(0, 'rgba(200,225,255,0.22)');
    g.addColorStop(1, 'rgba(200,225,255,0)');
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, T * 0.55);

    g = ctx.createLinearGradient(0, H, 0, H - T * 0.55);
    g.addColorStop(0, 'rgba(255,230,180,0.22)');
    g.addColorStop(1, 'rgba(255,230,180,0)');
    ctx.fillStyle = g; ctx.fillRect(0, H - T * 0.55, W, T * 0.55);

    // ── Corner vignette ──
    // Corners of a curved glass are thickest — darker and more opaque.
    const cornerR = T * 1.6;
    const corners = [[0, 0], [W, 0], [W, H], [0, H]];
    for (const [cx, cy] of corners) {
      const vg = ctx.createRadialGradient(cx, cy, 0, cx, cy, cornerR);
      vg.addColorStop(0,    'rgba(255,255,255,0.55)');
      vg.addColorStop(0.5,  'rgba(255,255,255,0.12)');
      vg.addColorStop(1,    'rgba(255,255,255,0)');
      ctx.fillStyle = vg;
      ctx.fillRect(
        cx === 0 ? 0 : W - cornerR,
        cy === 0 ? 0 : H - cornerR,
        cornerR, cornerR
      );
    }

    // ── Specular hairline — bright rim right at the very edge ──
    ctx.strokeStyle = 'rgba(255,255,255,0.95)';
    ctx.lineWidth   = 1.5;
    ctx.strokeRect(0.75, 0.75, W - 1.5, H - 1.5);

    // ── Dark outer bezel — gives the glass physical thickness ──
    ctx.strokeStyle = 'rgba(0,0,0,0.13)';
    ctx.lineWidth   = 2.5;
    ctx.strokeRect(1.25, 1.25, W - 2.5, H - 2.5);
  }

  /* ─── Animation loop ────────────────────────────────────────────── */
  function loop() {
    update();
    drawFrame();
    raf = requestAnimationFrame(loop);
  }

  /* ─── Shake burst ───────────────────────────────────────────────── */
  function applyShake(strength) {
    for (const p of particles) {
      p.vx += (Math.random() - 0.5) * 11 * strength;
      p.vy += (Math.random() * -0.9 - 0.1) * 11 * strength;
      p.vz += (Math.random() - 0.5) * 11 * strength;
    }
  }

  /* ─── Activate physics ──────────────────────────────────────────── */
  function startPhysics() {
    if (state === 'active') return;
    state = 'active';
    for (const p of particles) {
      p.z = (Math.random() - 0.5) * Z_MAX * 0.4;
    }
    applyShake(1.2);
    loop();
  }

  /* ─── Tap ───────────────────────────────────────────────────────── */
  let permAsked = false;

  canvas.addEventListener('click', async () => {
    if (!permAsked) {
      permAsked = true;
      if (
        typeof DeviceMotionEvent !== 'undefined' &&
        typeof DeviceMotionEvent.requestPermission === 'function'
      ) {
        try {
          const perm = await DeviceMotionEvent.requestPermission();
          if (perm === 'granted') window.addEventListener('devicemotion', onMotion);
        } catch (e) {}
      } else {
        window.addEventListener('devicemotion', onMotion);
      }
    }

    if (state === 'initial') startPhysics();
    else                     applyShake(0.85);
  });

  /* ─── Device shake ──────────────────────────────────────────────── */
  let lastAcc = { x: 0, y: 0, z: 0 };

  function onMotion(e) {
    const acc = e.accelerationIncludingGravity;
    if (!acc) return;
    const dx  = (acc.x || 0) - lastAcc.x;
    const dy  = (acc.y || 0) - lastAcc.y;
    const dz  = (acc.z || 0) - lastAcc.z;
    const mag = Math.sqrt(dx * dx + dy * dy + dz * dz);
    if (mag > 12) {
      if (state === 'initial') startPhysics();
      else applyShake(Math.min(mag / 12, 2.5));
    }
    lastAcc = { x: acc.x || 0, y: acc.y || 0, z: acc.z || 0 };
  }

  /* ─── Boot ──────────────────────────────────────────────────────── */
  async function init() {
    await document.fonts.ready;
    setupCanvas();
    measureParticles();
  }

  init();

  /* ─── Resize ────────────────────────────────────────────────────── */
  window.addEventListener('resize', () => {
    setupCanvas();
    if (state === 'initial') drawFrame();
  });

  /* ─── Pause on hide ─────────────────────────────────────────────── */
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) cancelAnimationFrame(raf);
    else if (state === 'active' && particles.length) loop();
  });
</script>
</body>
</html>
